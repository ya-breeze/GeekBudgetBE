version: "3.8"

services:
  # Backend - Go API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      # Default environment variables - can be overridden
      GB_SEED_USERS: ${GB_SEED_USERS:-}
      GB_DBPATH: ${GB_DBPATH:-/data/geekbudget.db}
      GB_ALLOWEDORIGINS: ${GB_ALLOWEDORIGINS:-http://localhost,http://localhost:80,http://localhost:8080}
      GB_JWT_SECRET: ${GB_JWT_SECRET:-}
      GB_COOKIESECURE: ${GB_COOKIESECURE:-true}
      GB_PORT: ${GB_PORT:-8080}
      GB_DISABLEIMPORTERS: ${GB_DISABLEIMPORTERS:-false}
      GB_MAXPERFILESIZEMB: ${GB_MAXPERFILESIZEMB:-200}
      GB_MAXBATCHFILES: ${GB_MAXBATCHFILES:-100}
      GB_MAXBATCHTOTALSIZEMB: ${GB_MAXBATCHTOTALSIZEMB:-1000}
      GB_PREFILL: ${GB_PREFILL:-false}
      GB_BANKIMPORTERFILESPATH: ${GB_BANKIMPORTERFILESPATH:-/data/bank-importer-files}
      GB_BACKUP_PATH: ${GB_BACKUP_PATH:-}
      GB_BACKUP_INTERVAL: ${GB_BACKUP_INTERVAL:-24h}
      GB_BACKUP_MAX_COUNT: ${GB_BACKUP_MAX_COUNT:-10}
    volumes:
      # External volume for database and assets
      - ${GEEKBUDGET_DATA_PATH:-./geekbudget-data}:/data
    networks:
      - geekbudget-network

  # Frontend - Angular with Nginx
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      # API URL for runtime configuration
      # Use relative path when behind nginx proxy, or full URL for direct access
      API_URL: ${API_URL:-/v1}
    depends_on:
      - backend
    networks:
      - geekbudget-network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    # volumes:
    #   # Uncomment for SSL certificates
    #   # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - geekbudget-network

networks:
  geekbudget-network:
    driver: bridge

volumes:
  geekbudget-data:
