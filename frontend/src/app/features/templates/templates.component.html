<div style="padding: 24px">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px">
    <h1 style="margin: 0">Templates</h1>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> New template
    </button>
  </div>

  @if (loading()) {
    <mat-spinner />
  } @else if (templates().length === 0) {
    <p style="color: var(--mat-sys-on-surface-variant)">No templates yet. Create one to get started.</p>
  } @else {
    <table mat-table [dataSource]="templates()" class="mat-elevation-z2" style="width: 100%">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let t">{{ t.name }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let t">{{ t.description }}</td>
      </ng-container>

      <ng-container matColumnDef="accounts">
        <th mat-header-cell *matHeaderCellDef>Accounts</th>
        <td mat-cell *matCellDef="let t">{{ getAccountNames(t) }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let t">
          <button mat-icon-button (click)="openEditDialog(t)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(t)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  }
</div>
