version: "3.8"

# WIP compose file - uses prebuilt images instead of build contexts.
# Used for local deployments without pushing to remote git.
# Build images first with deploy-wip.sh, then Portainer deploys from these tags.

services:
  backend:
    image: geekbudget-wip-backend:latest
    restart: unless-stopped
    environment:
      GB_USERS: ${GB_USERS:-test@test.com:JDJhJDEwJC9sVWJpTlBYVlZvcU9ZNUxIZmhqYi4vUnRuVkJNaEw4MTQ2VUdFSXRDeE9Ib0ZoVkRLR3pl}
      GB_DBPATH: ${GB_DBPATH:-/data/geekbudget.db}
      GB_ALLOWEDORIGINS: ${GB_ALLOWEDORIGINS:-http://localhost,http://localhost:80,http://localhost:8080}
      GB_JWTSECRET: ${GB_JWTSECRET:-}
      GB_SESSIONSECRET: ${GB_SESSIONSECRET:-}
      GB_COOKIESECURE: ${GB_COOKIESECURE:-true}
      GB_ISSUER: ${GB_ISSUER:-geekbudget}
      GB_PORT: ${GB_PORT:-8080}
      GB_DISABLEIMPORTERS: ${GB_DISABLEIMPORTERS:-false}
      GB_MAXPERFILESIZEMB: ${GB_MAXPERFILESIZEMB:-200}
      GB_MAXBATCHFILES: ${GB_MAXBATCHFILES:-100}
      GB_MAXBATCHTOTALSIZEMB: ${GB_MAXBATCHTOTALSIZEMB:-1000}
      GB_PREFILL: ${GB_PREFILL:-false}
      GB_BANKIMPORTERFILESPATH: ${GB_BANKIMPORTERFILESPATH:-/data/bank-importer-files}
    volumes:
      - ${GEEKBUDGET_DATA_PATH:-./geekbudget-data}:/data
    networks:
      - geekbudget-network

  frontend:
    image: geekbudget-wip-frontend:latest
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-/v1}
    depends_on:
      - backend
    networks:
      - geekbudget-network

  nginx:
    image: geekbudget-wip-nginx:latest
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - backend
      - frontend
    networks:
      - geekbudget-network

networks:
  geekbudget-network:
    driver: bridge

volumes:
  geekbudget-data:
